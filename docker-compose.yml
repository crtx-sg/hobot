services:
  # --- Core ---
  clinibot-gateway:
    build: ./clinibot
    depends_on:
      - ollama
      - mcp-ehr
      - mcp-monitoring
      - mcp-radiology
      - mcp-lis
      - mcp-pharmacy
      - mcp-bloodbank
      - mcp-erp
      - mcp-patient-services
      - audit-db
    volumes:
      - ./config:/app/config
      - ./schema:/app/schema
      - audit-data:/data/audit
      - sessions-data:/data/sessions
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - AUDIT_DB=/data/audit/clinic.db
      - SCHEMA_PATH=/app/schema/init.sql
      - TOOLS_CONFIG=/app/config/tools.json
      - CHANNELS_CONFIG=/app/config/channels.json
      - MONITORING_BASE=http://synthetic-monitoring:8000
      - EHR_BASE=http://synthetic-ehr:8080
      - LIS_BASE=http://synthetic-lis:8000
      - PHARMACY_BASE=http://synthetic-pharmacy:8000
      - RADIOLOGY_BASE=http://synthetic-radiology:8042
      - BLOODBANK_BASE=http://synthetic-bloodbank:8000
      - ERP_BASE=http://synthetic-erp:8000
      - PATIENT_SERVICES_BASE=http://synthetic-patient-services:8000
      - SESSIONS_DIR=/data/sessions
      - CONFIG_PATH=/app/config/config.json
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_KEYS=${API_KEYS:-}
      - ORTHANC_USER=${ORTHANC_USER:-orthanc}
      - ORTHANC_PASS=${ORTHANC_PASS:-orthanc}

  # --- Telegram Bot ---
  telegram-bot:
    build: ./telegram-bot
    depends_on: [clinibot-gateway]
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GATEWAY_URL=http://clinibot-gateway:3000
      - TENANT_ID=default
      - API_KEY=${TG_BOT_API_KEY:-}
    restart: unless-stopped

  # --- Models ---
  ollama:
    image: ollama/ollama
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11435:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # MedGemma vision model via vLLM (OpenAI-compatible API)
  # Gated model: accept terms at https://huggingface.co/google/medgemma-4b-it
  # then set HF_TOKEN in .env
  vllm-medgemma:
    image: vllm/vllm-openai:latest
    volumes:
      - vllm-models:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command: >
      --model google/medgemma-4b-it
      --dtype auto
      --max-model-len 4096
      --trust-remote-code
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- MCP Tool Servers ---
  mcp-ehr:
    build: ./mcp-ehr
    depends_on: [synthetic-ehr]
    environment:
      - FHIR_BASE=http://synthetic-ehr:8080/fhir

  mcp-monitoring:
    build: ./mcp-monitoring
    depends_on: [synthetic-monitoring]
    environment:
      - MONITORING_BASE=http://synthetic-monitoring:8000

  mcp-radiology:
    build: ./mcp-radiology
    depends_on: [synthetic-radiology]
    environment:
      - ORTHANC_BASE=http://synthetic-radiology:8042

  mcp-lis:
    build: ./mcp-lis
    depends_on: [synthetic-lis]
    environment:
      - LIS_BASE=http://synthetic-lis:8000

  mcp-pharmacy:
    build: ./mcp-pharmacy
    depends_on: [synthetic-pharmacy]
    environment:
      - PHARMACY_BASE=http://synthetic-pharmacy:8000

  mcp-bloodbank:
    build: ./mcp-bloodbank
    depends_on: [synthetic-bloodbank]
    environment:
      - BLOODBANK_BASE=http://synthetic-bloodbank:8000

  mcp-erp:
    build: ./mcp-erp
    depends_on: [synthetic-erp]
    environment:
      - ERP_BASE=http://synthetic-erp:8000

  mcp-patient-services:
    build: ./mcp-patient-services
    depends_on: [synthetic-patient-services]
    environment:
      - PATIENT_SERVICES_BASE=http://synthetic-patient-services:8000

  # --- Synthetic Backends ---
  synthetic-ehr:
    image: hapiproject/hapi:latest
    ports: ["8080:8080"]

  synthetic-monitoring:
    build: ./synthetic-monitoring
    volumes:
      - hdf5-data:/data/hdf5

  synthetic-radiology:
    image: orthancteam/orthanc
    ports: ["8042:8042"]

  synthetic-lis:
    build: ./synthetic-lis

  synthetic-pharmacy:
    build: ./synthetic-pharmacy

  synthetic-bloodbank:
    build: ./synthetic-bloodbank

  synthetic-erp:
    build: ./synthetic-erp

  synthetic-patient-services:
    build: ./synthetic-patient-services

  # --- Audit DB Web UI (no external port — internal only; expose via docker-compose.override.yml for dev) ---
  audit-db:
    image: coleifer/sqlite-web
    volumes:
      - audit-data:/data
    command: sqlite_web -H 0.0.0.0 /data/clinic.db

volumes:
  ollama-models:
  vllm-models:
  audit-data:
  sessions-data:
  hdf5-data:
